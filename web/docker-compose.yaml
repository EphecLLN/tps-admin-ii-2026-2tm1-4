services:
  dns:
    build:
      context: ./dns
      dockerfile: Dockerfile
    container_name: dns-server
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    networks:
      - app_net
    volumes:
      - ./dns:/etc/bind

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: php-app-new
    volumes:
      - ./html:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/php.ini
    env_file: .env
    networks:
      - app_net

  web:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./html:/var/www/html
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./certificate/nginx-selfsigned.crt:/etc/ssl/certs/nginx-selfsigned.crt:ro
      - ./certificate/nginx-selfsigned.key:/etc/ssl/private/nginx-selfsigned.key:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./www:/var/www/html/www
      - ./blog:/var/www/html/blog
      - ./letsencrypt:/etc/letsencrypt
    depends_on:
      - dns
      - php
      - db
    networks:
      - app_net

  db:
    image: mariadb:11.1
    container_name: mysql-db
    environment:
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_DATABASE=woodytoys
      - MARIADB_USER=wt-user
      - MARIADB_PASSWORD=wt-pwd

    env_file: .env
    volumes:
      - ./mysql/woodytoys.sql:/docker-entrypoint-initdb.d/woodytoys.sql
      - ./mysql:/docker-entrypoint-initdb.d:ro
      - mariadb_data:/var/lib/mysql  # <--- Ajout de la persistance ici
    networks:
      - app_net

  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mail-server
    hostname: mail
    domainname: m1-4.ephec-ti.be
    ports:
      - "25:25"    # SMTP
      - "587:587"  # SMTP (STARTTLS)
      - "993:993"  # IMAP (SSL/TLS)
    volumes:
      - ./docker-mailserver/mail-data:/var/mail
      - ./docker-mailserver/mail-state:/var/mail-state
      - ./docker-mailserver/mail-logs:/var/log/mail
      - ./docker-mailserver/config:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
      - ./letsencrypt:/etc/letsencrypt:ro
    environment:
      - ENABLE_SPAMASSASSIN=1
      - ENABLE_CLAMAV=0 # Désactivé pour économiser de la RAM sur petit VPS
      - ENABLE_FAIL2BAN=1
      - SSL_TYPE=letsencrypt
    restart: always
    env_file:
      - mailserver.env

networks:
  app_net:
    driver: bridge

volumes:
  mariadb_data:
