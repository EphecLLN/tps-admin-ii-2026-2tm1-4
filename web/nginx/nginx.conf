http {
      server_tokens off;
      log_format log_per_virtualhost '[$host] $remote_addr [$time_local] $status "$request" $body_bytes_sent';
      access_log /dev/stdout log_per_virtualhost;

      # --- REDIRECTION HTTP vers HTTPS ---
      server {
          listen 80;
          server_name www.m1-4.ephec-ti.be blog.m1-4.ephec-ti.be localhost;
          return 301 https://$host$request_uri;
      }

      # --- CONFIGURATION HTTPS (Site WWW) ---
      server {
          listen 443 ssl;
          server_name www.m1-4.ephec-ti.be localhost;

          # On utilise le chemin que tu as défini dans le volume docker-compose
          ssl_certificate /etc/nginx/ssl/selfsigned.crt;
          ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

          index index.php index.html;
          root /var/www/html/www/;

          location ~* \.php$ {
              # On utilise le nom du service définit dans docker-compose
              fastcgi_pass php:9000; 
              include fastcgi_params;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
          }
      }

      # --- CONFIGURATION HTTPS (Site BLOG) ---
      server {
          listen 443 ssl;
          server_name blog.m1-4.ephec-ti.be;

          ssl_certificate /etc/nginx/ssl/selfsigned.crt;
          ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

          index index.html;
          root /var/www/html/blog/;
      }
  }
